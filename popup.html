<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EmbaBrain capture</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 480px;
      margin: 0;
      padding: 12px;
      background: #fafafa;
      color: #222;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 8px 0;
      font-weight: 600;
    }
    .row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    button {
      flex: 1;
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      background: #f0f0f0;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button.primary {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    button.primary:hover:not(:disabled) {
      background: #1d4ed8;
    }
    textarea {
      width: 100%;
      height: 300px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      resize: vertical;
      background: #fff;
    }
    #tip {
      display: none;
      font-size: 12px;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      color: #78350f;
      padding: 8px 10px;
      border-radius: 4px;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .options {
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
    }
    .options label {
      cursor: pointer;
      user-select: none;
    }
    .options input {
      vertical-align: middle;
      margin-right: 4px;
    }
    #status {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      min-height: 16px;
    }
    .footer-links {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      text-align: right;
    }
    .footer-links a {
      color: #2563eb;
      text-decoration: none;
      cursor: pointer;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }
    #status.error {
      color: #b91c1c;
    }
    #status.success {
      color: #15803d;
    }
  </style>
</head>
<body>
  <h1>EmbaBrain capture</h1>
  <div id="tip"></div>
  <div class="options">
    <label>
      <input type="checkbox" id="verbose">
      Verbose mode (skip Readability — fuller capture on profile pages)
    </label>
  </div>
  <div class="row">
    <button id="extract" class="primary">Extract page</button>
    <button id="copy" disabled>Copy</button>
    <button id="download" disabled>Download .md</button>
  </div>
  <textarea id="output" placeholder="Click &quot;Extract page&quot; to capture the current page as markdown." readonly></textarea>
  <div id="status"></div>
  <div class="footer-links">
    <a id="open-options">⚙ Manage rules</a>
  </div>
  <script src="site-rules.js"></script>
  <script src="popup.js"></script>
</body>
</html>
